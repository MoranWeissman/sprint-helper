<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sprint Helper — palette options</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="palette-options.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="palette-options.jsx"></script>
<script type="text/babel">
const { createRoot } = ReactDOM;

function App() {
  return (
    <main>
      <header className="po-pagehead">
        <h1>Palette options</h1>
        <p>
          Each option keeps the rules from the brief: dark, one accent only, low chroma, no rainbow.
          The "happier" feel comes from <b>shifting the accent hue and warming the background</b> — not
          from adding a second color.
        </p>
        <p className="rule">
          <b>Chromatic (accent is a color):</b> Moonlit blue is the current baseline.
          Honey amber or Peach blush for clearly warmer/cozier. Mint sage for a fresh "morning" reading.
          Citron is the loudest option still inside the rules.
        </p>
        <p className="rule">
          <b>Grayscale-with-tint (accent is a near-white):</b> Five quieter takes on the "dark + gray" idea —
          each background carries a faint hue tilt (warm graphite, cool slate, olive ash, plum smoke, petrol steel)
          and the focal accent is a tinted white. <b>Lightness contrast does the focal-point work instead of color.</b>
          These are the calmest options on the page.
        </p>
      </header>
      <PaletteOptions />
    </main>
  );
}

createRoot(document.getElementById("root")).render(<App />);
</script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
